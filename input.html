  <title>Galaxy love 2.0</title>
  <link rel="icon" href="https://github.com/Panbap/anh/blob/main/icon1.png?raw=true" type="image/png">

  <div id="loading-screen">
    <div class="spinner"></div>
    <div>Loading...</div>
  </div>
  <div class="container">
    <h1>Tạo tinh cầu ảnh</h1>

    <div class="instructions">
      Nhập một hoặc nhiều link (URL), ngăn cách bằng dấu phẩy ( , ) hoặc xuống dòng.<br />
      Ví dụ:<br />
      <code>https://devpan.com/anh1.jpg, https://devpan.com/anh2.png</code>
    </div>

    <label for="upload-imgbb" class="custom-upload-button">📷 Upload ảnh</label>
    <input type="file" id="upload-imgbb" accept="image/*" multiple hidden>

    <textarea id="image-links" rows="5" placeholder="Nhập link ảnh tại đây..."></textarea><br />
    <button id="generate-link" class="btn-generate">Tạo link</button>
    <div id="created-link"></div>
    <div id="preview"></div>

    <div id="captcha-popup">
      <div>
        <h3>Vui lòng nhập CAPTCHA</h3>
        <div style="margin:15px 0; display: flex; align-items: center; gap: 10px;">
          <span id="captcha-code"></span>
          <button id="refresh-captcha" title="Làm mới CAPTCHA">🔄</button>
        </div>
        <input type="text" id="captcha-input" placeholder="Nhập mã xác thực.." autocomplete="off" />
        <div id="captcha-error"></div>
        <button id="captcha-submit">Xác nhận</button>
      </div>
    </div>
  </div>
